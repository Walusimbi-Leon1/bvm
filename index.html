<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BVM — Bible Verse Memorization (SGSS)</title>
  <meta name="description" content="Memorize the Bible, one verse at a time. Auto-rotating verses from the SGSS Bible every 5 minutes.">
  <meta name="author" content="Walusimbi Leon">
  <meta property="og:title" content="BVM — Bible Verse Memorization">
  <meta property="og:description" content="330 carefully chosen verses from every book of the SGSS Bible. Auto-rotates every 5 minutes.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📖</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Background ── -->
  <canvas id="stars-canvas"></canvas>
  <div class="bg-gradient"></div>

  <!-- ── Header ── -->
  <header>
    <div class="header-inner">
      <a href="#" class="logo">BVM <span>Memory</span></a>
      <div class="header-actions">
        <button id="browseBtn" class="btn-icon" aria-label="Browse all verses" title="Browse All Verses">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
          </svg>
        </button>
        <button id="randomBtn" class="btn-icon" aria-label="Random verse" title="Random Verse">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"></polyline>
            <line x1="4" y1="20" x2="21" y2="3"></line>
            <polyline points="21 16 21 21 16 21"></polyline>
            <line x1="15" y1="15" x2="21" y2="21"></line>
            <line x1="4" y1="4" x2="9" y2="9"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main>
    <div class="container">

      <!-- Verse Display -->
      <div class="verse-card" id="verseCard">
        <div class="verse-card-bg"></div>
        <div class="verse-number" id="verseNumber">#1</div>
        <div class="verse-text" id="verseText">Loading...</div>
        <div class="verse-ref" id="verseRef">—</div>
        <div class="verse-divider"></div>
        <div class="verse-book-marker" id="bookMarker">
          <span class="book-dot"></span>
          <span class="book-name" id="bookName">Genesis</span>
          <span class="book-progress" id="bookProgress">Verse 1 of 5</span>
        </div>
      </div>

      <!-- Navigation -->
      <div class="nav-bar">
        <button id="prevBtn" class="btn-nav" aria-label="Previous verse">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          <span>Previous</span>
        </button>

        <div class="nav-center">
          <div class="timer-ring">
            <svg class="timer-svg" viewBox="0 0 100 100">
              <circle class="timer-track" cx="50" cy="50" r="46"/>
              <circle class="timer-fill" id="timerFill" cx="50" cy="50" r="46"
                stroke-dasharray="289.03" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-text" id="timerText">5:00</div>
          </div>
        </div>

        <button id="nextBtn" class="btn-nav" aria-label="Next verse">
          <span>Next</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>

      <!-- Global Progress -->
      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-label">Memorization Progress</span>
          <span class="progress-count" id="progressCount">1 / 330</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0.3%"></div>
        </div>
        <div class="progress-books" id="progressBooks"></div>
      </div>

    </div>
  </main>

  <!-- ── Browse Modal ── -->
  <div class="modal-overlay" id="browseModal">
    <div class="modal">
      <div class="modal-header">
        <h2>All Verses</h2>
        <button id="closeModal" class="btn-icon" aria-label="Close">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Search verses, books, or references..." autocomplete="off">
      </div>
      <div class="modal-list" id="verseList">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <!-- ── Footer ── -->
  <footer>
    <p>BVM &mdash; Bible Verse Memorization &bull; <a href="https://github.com/Walusimbi-Leon1/sgss-bible" target="_blank">SGSS Bible</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
